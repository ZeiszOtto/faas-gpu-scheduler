mode: "save"  # "save" = mappába ment, "http" = Knative service-nek küld

services:
  face_detect: "http://face-detect.default.192-168-1-200.sslip.io/detect"
  plate_detect: "http://plate-detect.default.192-168-1-200.sslip.io/detect"

video:
  source: "C:\\Users\\fragm\\Desktop\\inputs\\input.mp4"
  frame_skip: 1

filtering:
  min_person_height: 250   # pixel, ennél kisebb személyt kihagyjuk
  min_vehicle_width: 350   # pixel, ennél kisebb járművet kihagyjuk

tracking:
  cooldown_frames: 30

yolo:
  model: "yolov8n.pt"
  confidence_threshold: 0.5
  device: "cpu"

logging:
  output: "results.log"

output:
  save_dir: "crops"